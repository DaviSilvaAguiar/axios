services:

  # ──────────────────────────────────────────────
  # Banco de dados central (tenants registry)
  # ──────────────────────────────────────────────
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-axios}
      MYSQL_USER: ${DB_USERNAME:-axios}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${DB_ROOT_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ──────────────────────────────────────────────
  # Backend — Laravel 13 + Nginx com bind mount (porta 8000)
  # Mudanças em app/, routes/, config/ e database/ refletem sem rebuild.
  # Para mudanças em rotas/config: docker compose exec backend php artisan route:clear
  # ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      SANCTUM_STATEFUL_DOMAINS: ${SANCTUM_STATEFUL_DOMAINS:-localhost:3000}

      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-axios}
      DB_USERNAME: ${DB_USERNAME:-axios}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: local
      APP_LOCALE: pt_BR
      APP_FALLBACK_LOCALE: pt_BR
    entrypoint: ["/dev-entrypoint.sh"]
    volumes:
      - ./docker/dev-entrypoint.sh:/dev-entrypoint.sh:ro
      - ./backend/app:/var/www/html/app
      - ./backend/routes:/var/www/html/routes
      - ./backend/config:/var/www/html/config
      - ./backend/database:/var/www/html/database
      - backend_storage:/var/www/html/storage
    ports:
      - "8000:8080"
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db_data:
  backend_storage:
